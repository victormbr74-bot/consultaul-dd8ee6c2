<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta Lotericas</title>
    <meta name="description" content="Sistema de gestao de unidades lotericas" />
    <meta name="author" content="Consulta Lotericas" />

    <link
      id="app-favicon"
      rel="icon"
      type="image/svg+xml"
      href="/favicon-light.svg?v=20260214-2"
      data-href-light="/favicon-light.svg?v=20260214-2"
      data-href-dark="/favicon-dark.svg?v=20260214-2"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("lvh:theme-mode");
          const mode =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          const link = document.getElementById("app-favicon");
          if (!link) return;

          const href =
            mode === "dark" ? link.getAttribute("data-href-dark") : link.getAttribute("data-href-light");
          if (href) link.setAttribute("href", href);
        } catch {
          // ignore
        }
      })();
    </script>

    <meta property="og:title" content="Consulta Lotericas" />
    <meta property="og:description" content="Sistema de gestao de unidades lotericas" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ConsultaLotericas" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
